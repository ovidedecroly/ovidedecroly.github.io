{% extends "base.html" %}

{% block content %}
<section class="page-hero">
  <div class="container">
    <p class="eyebrow">Books</p>
    <h1>{{ section.title }}</h1>
    {% if section.description %}<p class="lead">{{ section.description }}</p>{% endif %}
  </div>
</section>

<section class="section muted">
  <div class="container book-grid">
    {% for page in section.pages %}
      {% include "partials/book-card.html" %}
    {% endfor %}
  </div>
</section>
{% endblock content %}
