<article class="card">
  <p class="card-date">{{ page.date | date(format="%d %B %Y") }}</p>
  <h3><a href="{{ page.permalink }}">{{ page.title }}</a></h3>
  {% if page.description %}<p>{{ page.description }}</p>{% endif %}
  {% if page.taxonomies.tags %}
    <div class="tag-row small">
      {% for tag in page.taxonomies.tags | slice(end=3) %}<span>{{ tag }}</span>{% endfor %}
    </div>
  {% endif %}
</article>
