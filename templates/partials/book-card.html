<article class="book-card">
  {% if page.extra.cover %}
    <img class="book-cover" src="{{ page.extra.cover }}" alt="{{ page.title }}">
  {% endif %}

  <div class="book-card-body">
    {% if page.extra.status %}
      <p class="status">{{ page.extra.status }}</p>
    {% endif %}

    <h3>
      <a href="{{ page.permalink | safe }}">{{ page.title }}</a>
    </h3>

    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}

    <div class="book-actions">
      <a class="btn small" href="{{ page.permalink | safe }}">Details</a>

      {% if page.extra.pdf %}
        <a class="btn small primary" href="{{ page.extra.pdf }}" target="_blank" rel="noopener">Download PDF</a>
      {% endif %}
    </div>
  </div>
</article>
