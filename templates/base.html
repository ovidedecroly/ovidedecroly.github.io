<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% if page and page.title %}{{ page.title }} | {{ config.title }}{% elif section and section.title %}{{ section.title }} | {{ config.title }}{% else %}{{ config.title }}{% endif %}{% endblock title %}</title>
  <meta name="description" content="{% if page and page.description %}{{ page.description }}{% elif section and section.description %}{{ section.description }}{% else %}{{ config.description }}{% endif %}">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="/atom.xml">
</head>
<body>
<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="/">
      <img src="/images/logo-ovide-academy.png" alt="Ovide Academy" class="brand-logo">
    </a>
    <nav class="main-nav" aria-label="Main navigation">
      {% for item in config.extra.nav %}
        <a href="{{ item.url }}">{{ item.name }}</a>
      {% endfor %}
    </nav>
  </div>
</header>

  <main>
    {% block content %}{% endblock content %}
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <strong>{{ config.title }}</strong>
        <p>{{ config.extra.headline }}</p>
      </div>
      <div>
        <p>Built with Zola and hosted on GitHub Pages.</p>
        <p>&copy; {{ now() | date(format="%Y") }} {{ config.extra.author }}</p>
      </div>
    </div>
  </footer>
</body>
</html>
