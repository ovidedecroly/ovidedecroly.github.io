{% extends "base.html" %}

{% block content %}
<section class="page-hero">
  <div class="container narrow">
    <p class="eyebrow">About</p>
    <h1>{{ page.title }}</h1>

    {% if page.description %}
      <p class="lead">{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<section class="article">
  <div class="container narrow">
    <div class="content">
      {{ page.content | safe }}
    </div>
  </div>
</section>
{% endblock content %}
